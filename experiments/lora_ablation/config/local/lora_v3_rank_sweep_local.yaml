# Local re-run config for lora_v3_rank_sweep
# Training was done on Picasso (A100-40GB). This config re-runs
# Steps 2-10 (extraction, probes, dice, tables, analysis) from
# existing checkpoints using the local RTX 4060 (8GB VRAM).

experiment:
  name: lora_v3_rank_sweep
  seed: 42
  output_dir: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/results/LORA_Module/lora_v3_rank_sweep

paths:
  checkpoint: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/checkpoints/BrainSegFounder_finetuned_BraTS/finetuned_model_fold_0.pt
  data_root: /media/mpascual/PortableSSD/Meningiomas/BraTS/BraTS_Men_Train
  h5_file: /media/mpascual/PortableSSD/Meningiomas/BraTS/h5_format/BraTS_MEN.h5
  glioma_root: /media/mpascual/PortableSSD/BraTS_GLI/LowRes_HighRes/high_resolution

data:
  roi_size: [128, 128, 128]
  feature_roi_size: [192, 192, 192]
  spacing: [1.0, 1.0, 1.0]

data_splits:
  lora_train: 525
  lora_val: 100
  sdp_train: 225
  test: 150

conditions:
  - name: baseline_frozen
    lora_rank: null
    skip_training: true
    description: Original BrainSegFounder (completely frozen)

  - name: baseline
    lora_rank: null
    description: Frozen encoder + trainable decoder (no adaptation)

  - name: lora_r4_full
    lora_rank: 4
    lora_alpha: 8
    use_vicreg: true
    lambda_aux_override: 0.3
    description: LoRA r=4 + VICReg + lambda_aux=0.3

  - name: lora_r8_full
    lora_rank: 8
    lora_alpha: 16
    use_vicreg: true
    lambda_aux_override: 0.3
    description: LoRA r=8 + VICReg + lambda_aux=0.3

  - name: lora_r16_full
    lora_rank: 16
    lora_alpha: 32
    use_vicreg: true
    lambda_aux_override: 0.3
    description: LoRA r=16 + VICReg + lambda_aux=0.3

  - name: lora_r32_full
    lora_rank: 32
    lora_alpha: 64
    use_vicreg: true
    lambda_aux_override: 0.3
    description: LoRA r=32 + VICReg + lambda_aux=0.3

  - name: lora_r64_full
    lora_rank: 64
    lora_alpha: 128
    use_vicreg: true
    lambda_aux_override: 0.3
    description: LoRA r=64 + VICReg + lambda_aux=0.3 (saturation)

training:
  max_epochs: 200
  early_stopping_patience: 40
  batch_size: 2
  lr_encoder: 1.0e-4
  lr_decoder: 5.0e-4
  weight_decay: 1.0e-5
  num_workers: 4
  lora_dropout: 0.1
  gradient_clip: 1.0
  decoder_type: "original"
  freeze_decoder: false
  use_semantic_heads: true
  lambda_aux: 0.1
  aux_warmup_epochs: 10
  aux_warmup_duration: 20
  enable_gradient_monitoring: true
  gradient_monitor_freq: 50
  use_amp: true
  grad_accum_steps: 2
  lr_warmup_epochs: 5
  lr_reduce_factor: 0.5
  lr_reduce_patience: 10
  lambda_var_enc: 5.0
  lambda_cov_enc: 1.0
  vicreg_gamma: 1.0

loss:
  lambda_dice: 1.0
  lambda_ce: 1.0
  lambda_volume: 1.0
  lambda_location: 0.3
  lambda_shape: 1.0

probe:
  alpha_linear: 1.0
  n_restarts: 3               # Random restarts for GP-RBF optimization
  r2_ci_samples: 500          # Posterior samples for R² credible intervals
  normalize_features: true
  normalize_targets: true

feature_extraction:
  level: encoder10
  batch_size: 1
  pooling_mode: gap  # GAP only (TAP needs full decoder forward, OOM on 8GB)

domain_analysis:
  enabled: true
  num_samples: 200

visualization:
  umap_n_neighbors: 15
  umap_min_dist: 0.1
  color_by_semantic: true
  show_variance_per_dim: true
  show_scatter_plots: true

logging:
  log_every_n_steps: 10
  val_check_interval: 1.0

model_card:
  enabled: true
