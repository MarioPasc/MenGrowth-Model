# Production config for Picasso (SLURM + Singularity, CPU nodes).
# Signal: men_mean_entropy (LoRA-ensemble predictive entropy over MEN voxels),
# mean-matched to the empirical logvol_var scale. Entropy is not in
# (log-volume)^2 units; mean-matching fixes the scale while preserving the
# per-scan ranking, so lme_hetero injects an entropy-shaped, variance-scaled
# sigma_v^2. The logvol_var ablation lives in picasso_variance.yaml.
# NOTE: the merged H5 (with uncertainty/per_member_volumes) must be synced to
# the path below before launching; older Picasso copies may lack that group.

experiment:
  name: conformal_calibration
  seed: 42

paths:
  mengrowth_h5: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/h5_growth_datasets/MenGrowth.h5
  output_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/conformal_calibration/entropy

time:
  variable: ordinal
  missing_date_strategy: skip

uncertainty:
  estimator: mean_std
  signal: men_mean_entropy
  mean_signal: logvol_mean
  scaling: mean_matched
  floor_variance: 1.0e-6

volume:
  transform: identity

patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
  skip_all_zero_volume: true
  max_logvol_std: 1.0
  max_patients: null

ensemble:
  n_members: 20

models:
  lme_homo: true
  lme_hetero: true
  ensemble_bma: true

conformal:
  alpha: 0.05
  layers: [parametric, jackknife_plus, cqr_norm, cqr_proper]
  jackknife_plus:
    score: signed
  cqr_proper:
    calib_fraction: 0.33
    quantile_solver: highs

evaluation:
  protocol: last_from_rest
  n_seeds: 20
  n_restarts: 5

statistics:
  bootstrap:
    n_samples: 10000
    confidence_level: 0.95
    seed: 12345
  wilcoxon: true
  cohens_d: true
  bh_fdr_q: 0.05
  comparison_families:
    calibration_lift: true
    model_lift: true
    headline: true

reporting:
  tertiles: sigma_v_sq
  per_patient_seed: 0   # seed shown in the per-patient interval figure
  figures: [is_by_model_calibration, coverage_by_model_calibration, tertile_panel, width_vs_sigmav, per_patient_intervals]

slurm:
  partition: gputhin
  constraint: cpu
  time: "0-02:00:00"
  cpus_per_task: 8
  mem: "32G"
  conda_env: growth
  repo_dir: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/MenGrowth-Model
  logs_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/conformal_calibration/logs
  array_throttle: 40
