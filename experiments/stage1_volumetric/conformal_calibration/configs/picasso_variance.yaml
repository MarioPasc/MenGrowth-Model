# Production config for Picasso: signal = logvol_var (ablation of picasso.yaml).
# Identical to picasso.yaml except uncertainty.signal is the empirical
# LoRA-ensemble log-volume variance, injected raw (it is already in
# (log-volume)^2 units, so no mean-matching is applied).

experiment:
  name: conformal_calibration_variance
  seed: 42

paths:
  mengrowth_h5: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/h5_growth_datasets/MenGrowth.h5
  output_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/conformal_calibration/variance

time:
  variable: ordinal
  missing_date_strategy: skip

uncertainty:
  estimator: mean_std
  signal: logvol_var
  mean_signal: logvol_mean
  scaling: raw
  floor_variance: 1.0e-6

volume:
  transform: identity

patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
  skip_all_zero_volume: true
  max_logvol_std: 1.0
  max_patients: null

ensemble:
  n_members: 20

models:
  lme_homo: true
  lme_hetero: true
  ensemble_bma: true

conformal:
  alpha: 0.05
  layers: [parametric, jackknife_plus, cqr_norm, cqr_proper]
  jackknife_plus:
    score: signed
  cqr_proper:
    calib_fraction: 0.33
    quantile_solver: highs

evaluation:
  protocol: last_from_rest
  n_seeds: 20
  n_restarts: 5

statistics:
  bootstrap:
    n_samples: 10000
    confidence_level: 0.95
    seed: 12345
  wilcoxon: true
  cohens_d: true
  bh_fdr_q: 0.05
  comparison_families:
    calibration_lift: true
    model_lift: true
    headline: true

reporting:
  tertiles: sigma_v_sq
  per_patient_seed: 0   # seed shown in the per-patient interval figure
  figures: [is_by_model_calibration, coverage_by_model_calibration, tertile_panel, width_vs_sigmav, per_patient_intervals]

slurm:
  partition: gputhin
  constraint: cpu
  time: "0-02:00:00"
  cpus_per_task: 8
  mem: "32G"
  conda_env: growth
  repo_dir: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/MenGrowth-Model
  logs_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/conformal_calibration/variance_logs
  array_throttle: 40
