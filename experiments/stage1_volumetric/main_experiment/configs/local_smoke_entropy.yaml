# Smoke-test config — confirmatory τ-sweep over men_mean_entropy as σ²_v.
# Reduced grid (3 τ × 3 seeds) so the full pipeline runs locally in ~10 min.
# Matches the picasso_entropy.yaml schema; only counts and paths differ.

experiment:
  name: main_experiment_entropy_smoke
  seed: 42

paths:
  mengrowth_h5: /media/mpascual/MeningD2/MENINGIOMAS/MENGROWTH/050526/h5_format/MenGrowth.h5
  output_dir: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/results/uncertainty_propagation_volume_prediction/main_experiment_entropy_smoke

time:
  variable: ordinal
  missing_date_strategy: mixed

uncertainty:
  estimator: mean_std        # ignored when `signal` is set; kept for schema parity
  signal: men_mean_entropy   # confirmatory candidate (winner of stage-2 diagnostic)
  floor_variance: 1.0e-3

volume:
  transform: log1p

patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
  skip_all_zero_volume: true
  max_logvol_std: 1.0        # QC always uses /uncertainty/logvol_std

sweep:
  primary:
    family: empirical_shift
    tau_grid: null
    n_tau: 3
    saturation:
      # men_mean_entropy lives at ~0.5 (≈ 500× logvol_var scale); the floor
      # is still the same epistemic noise floor, but the ceiling is rescaled
      # to ~10× the empirical mean for this signal.
      sigma_v_sq_floor: 1.0e-3
      sigma_v_sq_ceil: 5.0
      safety_margin: 2.0
  ablation:
    enabled: false
    family: beta_alpha
    alpha_grid: [0.0]
    sigma_v_sq_max: 1.5
    steepness: 9.0
    n_seeds_override: 1

evaluation:
  protocol: last_from_rest
  n_seeds: 3
  n_restarts: 1
  models:
    fit_lme: true
    fit_lme_hetero_zero: true
    fit_lme_hetero_injected: true

statistics:
  bootstrap:
    n_samples: 500
    confidence_level: 0.95
    seed: 42
  wilcoxon: true
  cohens_d: true
  spearman_trend: true
  bh_fdr_q: 0.05
  pit_ks_test: true

reporting:
  figures:
    cov_vs_tau: true
    is_vs_tau: true
    sharpness_panel: true
    pit_grid: true
    qq_per_tertile: false
  transition_pairs:
    - [LME, LMEHetero_Injected]
    - [LMEHetero_Zero, LMEHetero_Injected]

slurm:
  partition: gputhin
  constraint: cpu
  time: "0-01:00:00"
  cpus_per_task: 4
  mem: "16G"
  conda_env: growth
  repo_dir: /home/mpascual/research/code/MenGrowth-Model
  logs_dir: /home/mpascual/research/code/MenGrowth-Model/logs/main_experiment_entropy_smoke
  array_throttle: 4
