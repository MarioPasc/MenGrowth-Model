# Confirmatory τ-sweep using men_mean_entropy as σ²_v.
# Mirror of picasso.yaml: same n_seeds=20, n_restarts=3, n_tau=9, B=10000.
# Differences vs picasso.yaml:
#   uncertainty.signal      :  null              → men_mean_entropy
#   sweep.saturation.ceil   :  50.0              → 5.0  (rescaled for entropy)
#   paths.output_dir        :  main_experiment   → main_experiment_entropy

experiment:
  name: main_experiment_entropy
  seed: 42

paths:
  mengrowth_h5: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/h5_growth_datasets/MenGrowth.h5
  output_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/uncertainty_propagation_volume_prediction/main_experiment_entropy

time:
  variable: ordinal
  missing_date_strategy: mixed

uncertainty:
  estimator: mean_std
  signal: men_mean_entropy
  floor_variance: 1.0e-3

volume:
  transform: log1p

patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
  skip_all_zero_volume: true
  max_logvol_std: 1.0

sweep:
  primary:
    family: empirical_shift
    tau_grid: null
    n_tau: 9
    saturation:
      # men_mean_entropy lives at ~0.5 (≈ 500× the logvol_var scale used in
      # picasso.yaml). Ceil is set to ~10× the empirical mean for parity
      # with the original logvol_var sweep, where 50.0 was ~10× the
      # post-QC max.
      sigma_v_sq_floor: 1.0e-3
      sigma_v_sq_ceil: 5.0
      safety_margin: 2.0
  ablation:
    enabled: false
    family: beta_alpha
    alpha_grid: [-1.0, 0.0, 1.0]
    sigma_v_sq_max: 1.5
    steepness: 9.0
    n_seeds_override: 10

evaluation:
  protocol: last_from_rest
  n_seeds: 20
  n_restarts: 3
  models:
    fit_lme: true
    fit_lme_hetero_zero: true
    fit_lme_hetero_injected: true

statistics:
  bootstrap:
    n_samples: 10000
    confidence_level: 0.95
    seed: 42
  wilcoxon: true
  cohens_d: true
  spearman_trend: true
  bh_fdr_q: 0.05
  pit_ks_test: true

reporting:
  figures:
    cov_vs_tau: true
    is_vs_tau: true
    sharpness_panel: true
    pit_grid: true
    qq_per_tertile: true
  transition_pairs:
    - [LME, LMEHetero_Injected]
    - [LMEHetero_Zero, LMEHetero_Injected]

slurm:
  partition: gputhin
  constraint: cpu
  time: "0-01:00:00"
  cpus_per_task: 4
  mem: "16G"
  conda_env: growth
  repo_dir: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/MenGrowth-Model
  logs_dir: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/MenGrowth-Model/logs/main_experiment_entropy
  array_throttle: 40
