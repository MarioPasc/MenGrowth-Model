# experiments/stage1_volumetric/config_stage1.yaml
# Stage 1: Volumetric Baseline — Growth Prediction from Manual Segmentations
#
# This config drives the Stage 1 pipeline that loads pre-computed WT volumes
# from the MenGrowth H5 and evaluates ScalarGP, LME, and HGP under LOPO-CV.
#
# Switch time.variable to "days_from_baseline" when timestamps arrive.
# Set covariates.enabled=true when age/sex metadata is complete.

experiment:
  name: stage1_volumetric_baseline
  seed: 42

paths:
  mengrowth_h5: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/data/source/MenGrowth.h5
  output_dir: experiments/stage1_volumetric/results

# Time variable: "ordinal" uses timepoint index, "days_from_baseline" uses
# real elapsed time (requires time_delta_days in H5 metadata).
time:
  variable: ordinal  # ordinal | days_from_baseline

# Volume transform applied during H5 creation (already in semantic/volume)
volume:
  transform: log1p

# Patient filtering
patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
  skip_all_zero_volume: true

# Clinical covariates for GP/LME mean function.
# Only patients with complete metadata will have covariates attached.
# Set enabled: true when age/sex data is available for the full cohort.
covariates:
  enabled: false
  features: [age, sex]
  missing_strategy: skip  # skip | impute_mean | drop_patient

# Shared GP/kernel parameters (ScalarGP and HGP)
gp:
  kernel: matern52
  mean_function: linear  # linear | gompertz (HGP ablation)
  n_restarts: 5
  max_iter: 1000
  lengthscale_bounds: [0.1, 50.0]
  signal_var_bounds: [0.001, 10.0]
  noise_var_bounds: [0.000001, 5.0]

# LME-specific config
lme:
  method: reml

# Which growth models to evaluate
models:
  scalar_gp: true
  lme: true
  hgp: true
  hgp_gompertz: true  # Ablation: HGP with Gompertz mean (S1-T7)

# Bootstrap CIs on LOPO-CV metrics
bootstrap:
  enabled: true
  n_samples: 2000
  confidence_level: 0.95
  seed: 42
