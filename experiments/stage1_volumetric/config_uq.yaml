# experiments/stage1_volumetric/config_uq.yaml
# Stage 1: Uncertainty-Propagated Volume Prediction
#
# Heteroscedastic growth models that propagate LoRA-ensemble segmentation
# uncertainty through to growth prediction. Paired with homoscedastic
# baselines for comparison.

experiment:
  name: stage1_volumetric_uq
  seed: 42

paths:
  mengrowth_h5: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/data/source/MenGrowth.h5
  output_dir: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/results/uncertainty_propagation_volume_prediction

time:
  variable: ordinal  # overridden by --real-time
  missing_date_strategy: mixed  # skip | mixed | fail

uncertainty:
  enabled: true
  estimator: mean_std  # mean_std | median_mad | mask_mean
  floor_variance: 1.0e-6

volume:
  transform: log1p

patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
  skip_all_zero_volume: true

covariates:
  enabled: false
  features: [age, sex]
  missing_strategy: skip

gp:
  kernel: matern52
  mean_function: linear
  n_restarts: 5
  max_iter: 1000
  lengthscale_bounds: [0.1, 50.0]
  signal_var_bounds: [0.001, 10.0]
  noise_var_bounds: [1.0e-6, 5.0]

lme:
  method: reml
  n_restarts: 5
  max_iter: 1000

models:
  scalar_gp: true
  scalar_gp_hetero: true
  lme: true
  lme_hetero: true
  hgp: true
  hgp_hetero: true
  hgp_gompertz: true
  hgp_gompertz_hetero: true

bootstrap:
  enabled: true
  n_samples: 2000
  confidence_level: 0.95
  seed: 42

variance_decomposition:
  enabled: true
  pairs:
    - [ScalarGP, ScalarGPHetero]
    - [LME, LMEHetero]
    - [HGP, HGPHetero]
    - [HGP_Gompertz, HGP_Gompertz_Hetero]
  n_permutations: 10000
