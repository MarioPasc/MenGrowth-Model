# Picasso HPC configuration for Stage 1 UQ Volume Prediction
#
# Usage:
#   # Submit all models in parallel:
#   bash experiments/stage1_volumetric/slurm/launcher.sh experiments/stage1_volumetric/configs/picasso.yaml
#
#   # Run single model:
#   python -m experiments.stage1_volumetric.run_single_model \
#       --model LME --config experiments/stage1_volumetric/configs/picasso.yaml
#
#   # Post-hoc analysis after all SLURM jobs complete:
#   python -m experiments.stage1_volumetric.run_analysis \
#       --config experiments/stage1_volumetric/configs/picasso.yaml

experiment:
  name: stage1_volumetric_uq_picasso
  seed: 42

paths:
  mengrowth_h5: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/h5_growth_datasets/MenGrowth.h5
  output_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/results/uncertainty_propagation_volume_prediction

time:
  variable: ordinal
  missing_date_strategy: mixed

uncertainty:
  enabled: true
  estimator: mean_std
  floor_variance: 1.0e-6

volume:
  transform: log1p

patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
  skip_all_zero_volume: true

covariates:
  enabled: false
  features: [age, sex]
  missing_strategy: skip

gp:
  kernel: matern52
  mean_function: linear
  n_restarts: 5
  max_iter: 1000
  lengthscale_bounds: [0.1, 50.0]
  signal_var_bounds: [0.001, 10.0]
  noise_var_bounds: [1.0e-6, 5.0]

lme:
  method: reml
  n_restarts: 5
  max_iter: 1000

models:
  scalar_gp: true
  scalar_gp_hetero: true
  lme: true
  lme_hetero: true
  hgp: true
  hgp_hetero: true
  hgp_gompertz: true
  hgp_gompertz_hetero: true

bootstrap:
  enabled: true
  n_samples: 2000
  confidence_level: 0.95
  seed: 42

variance_decomposition:
  enabled: true
  pairs:
    - [ScalarGP, ScalarGPHetero]
    - [LME, LMEHetero]
    - [HGP, HGPHetero]
    - [HGP_Gompertz, HGP_Gompertz_Hetero]
  n_permutations: 10000

analytical:
  enabled: true
  n_restarts: 3
  max_iter: 500
  fallback_to_1re: true
  models:
    exponential: true
    logistic: true
    gompertz: true

reporting:
  dss: true
  nlpd: true
  pit_histogram: true
  sharpness_scatter: true
  classical_vs_propagated:
    pairs:
      - [NLME_Exponential, LMEHetero]
      - [NLME_Logistic, LMEHetero]
      - [NLME_Gompertz, LMEHetero]
      - [NLME_Exponential, HGPHetero]
      - [NLME_Gompertz, HGPHetero]
    n_permutations: 10000
  analytical_vs_homo:
    pairs:
      - [NLME_Exponential, LME]
      - [NLME_Logistic, LME]
      - [NLME_Gompertz, LME]
      - [NLME_Exponential, ScalarGP]
      - [NLME_Gompertz, HGP]
    n_permutations: 10000

# --- Picasso SLURM settings (read by launcher.sh) ---
slurm:
  partition: gputhin
  constraint: cpu
  time: "0-01:00:00"
  cpus_per_task: 4
  mem: "16G"
  conda_env: growth
  repo_dir: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/MenGrowth-Model
  logs_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/logs/stage1_uq
