# Minimal config: LME + LMEHetero only for paired re-run after Y-variable fix

experiment:
  name: stage1_volumetric_uq_lme_rerun
  seed: 42

paths:
  mengrowth_h5: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/data/source/MenGrowth.h5
  output_dir: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/results/uncertainty_propagation_volume_prediction

time:
  variable: ordinal
  missing_date_strategy: mixed

uncertainty:
  enabled: true
  estimator: mean_std
  floor_variance: 1.0e-6

volume:
  transform: log1p

patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
  skip_all_zero_volume: true

covariates:
  enabled: false
  features: [age, sex]
  missing_strategy: skip

gp:
  kernel: matern52
  mean_function: linear
  n_restarts: 5
  max_iter: 1000
  lengthscale_bounds: [0.1, 50.0]
  signal_var_bounds: [0.001, 10.0]
  noise_var_bounds: [1.0e-6, 5.0]

lme:
  method: reml
  n_restarts: 5
  max_iter: 1000

models:
  scalar_gp: false
  scalar_gp_hetero: false
  lme: true
  lme_hetero: true
  hgp: false
  hgp_hetero: false
  hgp_gompertz: false
  hgp_gompertz_hetero: false

bootstrap:
  enabled: true
  n_samples: 2000
  confidence_level: 0.95
  seed: 42

variance_decomposition:
  enabled: true
  pairs:
    - [LME, LMEHetero]
  n_permutations: 10000
