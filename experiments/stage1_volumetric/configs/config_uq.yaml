# experiments/stage1_volumetric/config_uq.yaml
# Stage 1: Uncertainty-Propagated Volume Prediction
#
# Heteroscedastic growth models that propagate LoRA-ensemble segmentation
# uncertainty through to growth prediction. Paired with homoscedastic
# baselines for comparison.

experiment:
  name: stage1_volumetric_uq
  seed: 42

paths:
  mengrowth_h5: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/data/source/MenGrowth.h5
  output_dir: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/results/uncertainty_propagation_volume_prediction

time:
  variable: ordinal  # overridden by --real-time
  missing_date_strategy: mixed  # skip | mixed | fail

uncertainty:
  enabled: true
  estimator: mean_std  # mean_std | median_mad | mask_mean
  # floor_variance: lower bound on per-scan log-volume variance. Set to a
  # physiological floor representing minimum measurement noise expected from
  # any volumetric MRI segmentation (~5% relative volume CV → sigma_v~0.05 →
  # sigma_v^2~2.5e-3). Prevents the "vanishing sigma_v at the prediction
  # target" pathology that makes hetero models systematically sharper than
  # homoscedastic ones at typical scans (see docs/UQ_CALIBRATION_STORY.md
  # §6.3). Previously 1.0e-6 (purely numerical, no physical meaning).
  floor_variance: 1.0e-3

volume:
  transform: log1p

patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
  skip_all_zero_volume: true
  # max_logvol_std: drop any scan whose LoRA-ensemble logvol_std exceeds
  # this threshold. These scans are segmentation failures (zero-volume /
  # near-vanishing tumours where members disagree about whether to predict
  # any mask), not measurement noise. Their inflated sigma_v_k inflates the
  # mean sigma_v that REML absorbs into sigma_n, masking the per-scan
  # propagation effect on the well-segmented majority. See
  # docs/UQ_CALIBRATION_STORY.md §6.2. Comment out to disable filter.
  max_logvol_std: 1.0

covariates:
  enabled: false
  features: [age, sex]
  missing_strategy: skip

gp:
  kernel: matern52
  mean_function: linear
  n_restarts: 5
  max_iter: 1000
  lengthscale_bounds: [0.1, 50.0]
  signal_var_bounds: [0.001, 10.0]
  noise_var_bounds: [1.0e-6, 5.0]

lme:
  method: reml
  n_restarts: 5
  max_iter: 1000

models:
  scalar_gp: true
  scalar_gp_hetero: true
  lme: true
  lme_hetero: true
  hgp: true
  hgp_hetero: true
  hgp_gompertz: true
  hgp_gompertz_hetero: true

bootstrap:
  enabled: true
  n_samples: 2000
  confidence_level: 0.95
  seed: 42

variance_decomposition:
  enabled: true
  pairs:
    - [ScalarGP, ScalarGPHetero]
    - [LME, LMEHetero]
    - [HGP, HGPHetero]
    - [HGP_Gompertz, HGP_Gompertz_Hetero]
  n_permutations: 10000

# --- NLME analytical baselines (Engelhardt et al. 2023 approach) ---
analytical:
  enabled: true
  n_restarts: 3
  max_iter: 500
  fallback_to_1re: true
  models:
    exponential: true
    logistic: true
    gompertz: true

# --- Calibration reporting ---
reporting:
  dss: true
  nlpd: true
  pit_histogram: true
  sharpness_scatter: true
  # Analytical (NLME) vs Propagated (Hetero)
  classical_vs_propagated:
    pairs:
      - [NLME_Exponential, LMEHetero]
      - [NLME_Logistic, LMEHetero]
      - [NLME_Gompertz, LMEHetero]
      - [NLME_Exponential, HGPHetero]
      - [NLME_Gompertz, HGPHetero]
    n_permutations: 10000
  # Analytical (NLME) vs Homoscedastic
  analytical_vs_homo:
    pairs:
      - [NLME_Exponential, LME]
      - [NLME_Logistic, LME]
      - [NLME_Gompertz, LME]
      - [NLME_Exponential, ScalarGP]
      - [NLME_Gompertz, HGP]
    n_permutations: 10000
