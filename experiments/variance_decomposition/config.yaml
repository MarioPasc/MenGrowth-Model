# Variance Decomposition Configuration
# Spec: docs/stages/variance_decomposition.md

models:
  # Ordered from simplest to most complex
  - name: M0_mean
    type: population_mean
  - name: M1_ScalarGP
    type: scalar_gp
    kernel: matern52
    mean_function: linear
  - name: M2_HGP
    type: hgp
    kernel: matern52
  - name: M3_Severity
    type: severity
    growth_function: gompertz_reduced
  # M4 only if Stage 3 is warranted
  # - name: M4_Deep
  #   type: deep_features
  #   lora_rank: 8

statistics:
  n_permutations: 10000
  n_bootstrap: 2000
  confidence_level: 0.95
  alpha: 0.05

output:
  format: [json, csv]
  figures: true

seed: 42
