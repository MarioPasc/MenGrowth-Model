# experiments/segment_based_approach/config.yaml
# Ablation A0: Segment-Based Baseline

experiment:
  name: segment_based_baseline_a0
  seed: 42

paths:
  checkpoint: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/checkpoints/BrainSegFounder_finetuned_BraTS/finetuned_model_fold_0.pt
  mengrowth_h5: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/data/MenGrowth.h5
  output_dir: experiments/segment_based_approach/results

segmentation:
  sw_roi_size: [128, 128, 128]
  sw_overlap: 0.5
  sw_mode: gaussian
  wt_threshold: 0.5
  model_name: brainsegfounder       # group name under predicted_segs/ in H5
  save_to_h5: true                  # save probabilities + labels to H5

volume:
  transform: log1p

# Shared GP/kernel parameters (used by ScalarGP and HGP)
gp:
  kernel: matern52
  mean_function: linear
  n_restarts: 5
  max_iter: 1000
  lengthscale_bounds: [0.1, 50.0]
  signal_var_bounds: [0.001, 10.0]
  noise_var_bounds: [0.000001, 5.0]

# LME-specific config
lme:
  method: reml

# Which models to evaluate (all enabled by default)
models:
  scalar_gp: true
  lme: true
  hgp: true

time:
  variable: ordinal

patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
