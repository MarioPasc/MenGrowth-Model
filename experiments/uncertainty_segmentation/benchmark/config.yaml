# experiments/uncertainty_segmentation/benchmark/config.yaml
# BraTS Meningioma Segmentation Benchmark
#
# Benchmarks 5 SOTA models from BrainLesion/BraTS against our BSF+LoRA ensemble.
# Docker images from: https://github.com/BrainLesion/BraTS (meningioma.yml)
#
# References:
#   BraTS Orchestrator — Kofler et al. (2025), arXiv:2506.13807
#   BraTS 2023 Meningioma — LaBella et al. (2023), arXiv:2305.07642
#   BraTS-MEN Dataset — LaBella et al. (2024), Scientific Data 11:496

# =============================================================================
# Models to benchmark
# =============================================================================
benchmark:
  models:
    BraTS25_1:
      docker_image: "brainles/brats25_men_qing:latest"
      year: 2025
      interface: "docker_only"
      authors: "Yu Haitao et al."
      rank: "1st"
      paper: "N/A"

    BraTS25_2:
      docker_image: "brainles/brats25_men_mmdp:latest"
      year: 2025
      interface: "docker_only"
      authors: "Danesh Pajouh et al."
      rank: "2nd"
      paper: "N/A"

    BraTS23_1:
      docker_image: "brainles/brats23_meningioma_nvauto:latest"
      year: 2023
      interface: "mlcube"
      requires_root: true
      shm_size: "32g"
      authors: "Myronenko et al."
      rank: "1st"
      paper: "https://arxiv.org/abs/2510.25058"

    BraTS23_2:
      docker_image: "brainles/brats23_meningioma_blackbean:latest"
      year: 2023
      interface: "mlcube"
      requires_root: true
      shm_size: "4g"
      cpu_compatible: true
      authors: "Huang et al."
      rank: "2nd"
      paper: "https://doi.org/10.1007/978-3-031-76163-8_13"

    BraTS23_3:
      docker_image: "brainles/brats23_meningioma_cnmc_pmi2023:latest"
      year: 2023
      interface: "mlcube"
      requires_root: true
      shm_size: "2g"
      authors: "Capellán-Martín et al."
      rank: "3rd"
      paper: "https://api.semanticscholar.org/CorpusID:272599903"

  # Output label conventions differ between challenge years.
  # Ground truth (H5 raw BraTS-MEN): {1: NETC, 2: SNFH, 3: ET}
  # BraTS25 predictions: {1: SNFH, 2: ET}          (2-class, NETC dropped)
  # BraTS23 predictions: {1: NETC, 2: SNFH, 3: ET} (3-class, same as GT)
  label_maps:
    brats25:
      wt: [1, 2]
      tc: [2]
      et: [2]
    brats23:
      wt: [1, 2, 3]
      tc: [1, 3]
      et: [3]
    ground_truth:
      wt: [1, 2, 3]
      tc: [1, 3]
      et: [3]

  # BraTS-MEN naming convention (shared across all models)
  input_name_schema: "BraTS-MEN-{id:05d}-000"
  modalities: ["t1c", "t1n", "t2f", "t2w"]

  # H5 channel order (channel index → modality name)
  h5_channel_order: ["t2f", "t1c", "t1n", "t2w"]

# =============================================================================
# Paths — local development
# =============================================================================
paths:
  h5_file: "/media/mpascual/Sandisk2TB/research/growth-dynamics/growth/data/source/BraTS_MEN.h5"
  output_dir: "experiments/uncertainty_segmentation/benchmark/results"

# =============================================================================
# Paths — Picasso overrides (set as env vars in launcher, not merged via OmegaConf)
# =============================================================================
picasso:
  h5_file: "/mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/h5_growth_datasets/BraTS_MEN.h5"
  output_dir: "/mnt/home/users/tic_163_uma/mpascual/execs/growth/benchmark_segmentation"
  sif_dir: "/mnt/home/users/tic_163_uma/mpascual/fscratch/singularity_images"
  log_dir: "/mnt/home/users/tic_163_uma/mpascual/execs/growth/benchmark_segmentation/logs"

# =============================================================================
# SLURM configuration
# =============================================================================
slurm:
  conda_env: "mengrowth"
  constraint: "dgx"
  gpus: 1
  cpus: 4
  mem: "16G"
  time: "0-04:00:00"
