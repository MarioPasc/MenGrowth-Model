# experiments/uncertainty_segmentation/config/picasso/config_picasso.yaml
# Picasso-specific path overrides for LoRA-Ensemble
#
# Usage: merge with base config via OmegaConf
#   config = OmegaConf.merge(base_config, picasso_config)
#
# Batch-size rationale (encoder-only default, stages [1,2,3,4], extended
# target types): LoRA on every Swin stage loads activations at every stage;
# the dominant cost is stage 1 at 32^3 tokens with 96 channels (input 128^3,
# patch_embed stride 4). Empirical scaling from verify_extended_lora_report:
#   batch_size=2 spatial=128^3  ->  ~20 GB peak  (safe on A100 40GB)
#   batch_size=4 spatial=128^3  ->  ~40 GB peak  (at the limit, risky)
# So batch_size=2 with grad_accum=2 (effective batch = 4) is the safe choice.

experiment:
  output_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/uncertainty_segmentation_encoder_only

paths:
  checkpoint_dir: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/BrainSegFounder_finetuned_BraTS
  checkpoint_filename: finetuned_model_fold_0.pt
  men_h5_file: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/h5_growth_datasets/BraTS_MEN.h5
  mengrowth_h5_file: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/h5_growth_datasets/MenGrowth.h5
  gli_h5_file: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/h5_growth_datasets/BraTS_GLI.h5

training:
  num_workers: 16
  use_amp: true
  batch_size: 2             # A100 40GB: extended stages [1,2,3,4] OOM-risk at bs=4 (stage 1 at 32^3 dominates)
  grad_accum_steps: 2       # Effective batch size = 2 × 2 = 4

inference:
  # Save per-member soft probabilities (uint8-quantized NIfTI) for every test
  # scan. Required by the Dice(ensemble_k) curve and the threshold-sensitivity
  # analysis (see engine/ensemble_convergence.py). Disk cost ~20-30 GB per run
  # (150 scans × M=20 × 3 channels × 192^3 uint8, gzip-compressed).
  save_per_member_probs_all: true
