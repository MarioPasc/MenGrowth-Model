# Refactor validation config — BSF-aligned BraTS-hierarchical TC/WT/ET.
#
# One ensemble member, one epoch, reduced ROI for fast completion on
# the local RTX 4060. Training target is BraTS-hierarchical (matching
# BSF's pretrained output head): TC=(1|3), WT=(seg>0), ET=(3).
# Downstream clinical analyses derive disjoint regions
# (meningioma / necrotic / edema / enhancing) via
# ``growth.inference.postprocess.derive_disjoint_regions``.
# Volume label for meningioma = BSF ch0 (BraTS-TC) after CC cleanup.
#
# Usage:
#   python -m experiments.uncertainty_segmentation.run_train \
#          --config experiments/uncertainty_segmentation/config.yaml \
#          --config-override experiments/uncertainty_segmentation/config/test_native_bsf.yaml \
#          --member-id 0

ensemble:
  n_members: 1

training:
  epochs: 1
  batch_size: 1
  val_batch_size: 1
  use_amp: true
  grad_accum_steps: 1
  num_workers: 2
  early_stopping:
    patience: 99
  warmup_epochs: 1

data:
  roi_size: [64, 64, 64]
  val_roi_size: [64, 64, 64]
  inference_roi_size: [128, 128, 128]

experiment:
  output_dir: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/test
