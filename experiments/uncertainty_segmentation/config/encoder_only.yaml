# DEPRECATED (2026-04-22) — kept only for backward compatibility.
#
# The encoder-only regime (frozen decoder + trainable output head, LoRA on
# stages [1,2,3,4] with target types qkv+proj+fc1+fc2) is now the DEFAULT
# configuration, baked into:
#   - experiments/uncertainty_segmentation/config.yaml
#   - experiments/uncertainty_segmentation/config/picasso/config_picasso.yaml
#
# The slurm launcher no longer applies this file. If you need to re-enable
# full-decoder training, create a new override that sets:
#   lora.target_stages: [3, 4]
#   lora.target_module_types: ["qkv"]
#   training.freeze_decoder: false
#   training.train_output_head: false
# and merge it on top via an explicit launcher argument.
#
# This file is intentionally empty (no keys) so that any stray OmegaConf
# merge referencing it is a no-op.
