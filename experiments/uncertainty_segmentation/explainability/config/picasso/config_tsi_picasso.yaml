# Explainability — Picasso Override (refactored pipeline)
#
# Merged on top of base explainability/config.yaml via OmegaConf.
# Schema follows EXPLAINABILITY_ANALYSIS_SPEC.md §6 (2026-04-14): brain-masked
# TSI + ASI + DAD with the new ``n_scans_{tsi,asi,dad}`` keys.
#
# Key changes vs local:
#   - 192³ full-resolution (A100 40GB handles this easily)
#   - All 150 test scans for TSI / ASI (maximises power across stages)
#   - 30 GLI + 30 MEN scans for DAD (slow because of 1000 permutations)
#   - Picasso paths (fscratch mount points)
#
# Usage:
#   bash experiments/uncertainty_segmentation/explainability/slurm/launch_tsi.sh

analysis:
  n_scans_tsi: 150
  n_scans_asi: 150
  n_scans_dad: 30
  scan_selection: "first"
  roi_size: [192, 192, 192]

paths:
  base_results_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/uncertainty_segmentation_encoder_only
  output_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/uncertainty_segmentation_encoder_only/explaibility
  run_dir_pattern: "r{rank}_M20_s42"
