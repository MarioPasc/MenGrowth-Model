# experiments/uncertainty_segmentation/config.yaml
# LoRA-Ensemble for Uncertainty-Aware Meningioma Segmentation
#
# Reference: Mühlematter et al. (2024), arXiv:2405.14438

# =============================================================================
# Experiment metadata
# =============================================================================
experiment:
  name: "lora_ensemble_uncertainty"
  description: "LoRA-Ensemble (M adapters, shared backbone) for uncertainty-aware segmentation"
  output_dir: ./results/uncertainty_segmentation

# =============================================================================
# Paths (override in config/picasso/ for server)
# =============================================================================
paths:
  # BrainSegFounder checkpoint (finetuned on BraTS — includes pretrained decoder)
  checkpoint_dir: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/checkpoints/BrainSegFounder_finetuned_BraTS
  checkpoint_filename: finetuned_model_fold_0.pt

  # BraTS-MEN 2024 HDF5 (training data for LoRA adapters)
  men_h5_file: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/data/source/BraTS_MEN.h5

  # MenGrowth longitudinal HDF5 (inference-only, no labels)
  mengrowth_h5_file: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/data/source/MenGrowth.h5

  # BraTS-GLI semi-longitudinal HDF5 dataset, produced by scripts/convert_brats_gli_to_h5.py
  gli_h5_file: /media/mpascual/Sandisk2TB/research/growth-dynamics/growth/data/source/BraTS_GLI.h5
# =============================================================================
# Ensemble configuration
# =============================================================================
ensemble:
  n_members: 20             # M: number of LoRA adapters (rank ablation: r=4,8,16 × M=20)
  base_seed: 42             # seed_m = base_seed + member_id for m in 0..M-1

# =============================================================================
# LoRA configuration (fixed rank per run)
#
# Default regime (2026-04-22): encoder-only adaptation.
#   - Full SwinViT encoder adapted (stages 1-4).
#   - Extended target module types (qkv + proj + fc1 + fc2) — full Swin block.
#   - Decoder is frozen; only LoRA adapters + output head are trainable.
# Rationale: closes within-network distribution shift when adapting deep
# stages (stage 4's input is the modulated output of stage 3); tests whether
# encoder adaptation alone bridges the GLI->MEN domain gap. Rank overrides
# (config/picasso/config_r{2,4,16,32}.yaml) layer on top and only change
# rank/alpha, so this default holds across the full rank ablation sweep.
# =============================================================================
lora:
  rank: 8                   # r (fixed for all members in this run)
  alpha: 16                 # alpha (scaling = alpha/r = 2.0)
  dropout: 0.1              # LoRA dropout
  target_stages: [1, 2, 3, 4]    # Full SwinViT encoder — closes within-network distribution shift
  target_module_types:           # Full Swin block (extended beyond qkv-only):
    - "qkv"                      #   .attn.qkv  — combined Q,K,V projection
    - "proj"                     #   .attn.proj — attention output projection
    - "fc1"                      #   .mlp.fc1   — dim -> 4*dim   (linear1 in MONAI)
    - "fc2"                      #   .mlp.fc2   — 4*dim -> dim   (linear2 in MONAI)
  use_dora: false           # DoRA variant (Weight-Decomposed LoRA)

# =============================================================================
# Training configuration (each member trained independently)
# =============================================================================
training:
  epochs: 100
  batch_size: 1             # Per-GPU batch size (local RTX 4060 8GB)
  val_batch_size: 1
  learning_rate:
    encoder: 1.0e-4         # LoRA adapter LR
    decoder: 1.0e-4         # Unused when freeze_decoder=true (kept for schema compat)
    output_head: 1.0e-3     # Output head LR (only ~147 params, higher LR for fast adaptation)
  weight_decay: 1.0e-5
  early_stopping:
    patience: 20
    min_delta: 0.001
    monitor: "val_dice_mean"
  gradient_clip: 1.0
  num_workers: 4
  pin_memory: true
  warmup_epochs: 5
  use_amp: true             # bf16 mixed precision (safe for bf16, no GradScaler needed)
  grad_accum_steps: 4       # effective batch size = 1 × 4 = 4
  plateau_patience: 7       # LR reduction patience (after warmup)
  plateau_factor: 0.5
  plateau_min_lr: 1.0e-7

  # Model configuration
  decoder_type: "original"  # Use full SwinUNETR decoder (not lightweight head)
  freeze_decoder: true      # Encoder-only default: decoder weights are frozen
  train_output_head: true   # Unfreeze ONLY model.out (48->3 Conv3d, ~147 params)
  out_channels: 3           # Segmentation output channels (BraTS-hierarchical TC, WT, ET)

# =============================================================================
# Loss configuration
# =============================================================================
loss:
  lambda_dice: 1.0
  lambda_ce: 1.0

# =============================================================================
# Data configuration
# =============================================================================
data:
  modalities: ["t2f", "t1c", "t1n", "t2w"]   # CRITICAL: FLAIR, T1ce, T1, T2
  roi_size: [128, 128, 128]                   # Training ROI
  val_roi_size: [128, 128, 128]               # Validation ROI (128 for speed)
  inference_roi_size: [192, 192, 192]         # Full-resolution inference
  spacing: [1.0, 1.0, 1.0]
  train_split: "lora_train"
  val_split: "lora_val"
  test_split: "test"
  augment_train: true
  augment_gaussian_noise: true                # Sensor noise (inter-scanner variability)
  augment_gaussian_smooth: true               # Resolution variation across scanners

# =============================================================================
# Inference configuration (ensemble prediction)
# =============================================================================
inference:
  sw_roi_size: [128, 128, 128]    # Sliding window patch size
  sw_batch_size: 4                # Patches per forward pass
  sw_overlap: 0.5                 # Overlap fraction
  sw_mode: "gaussian"             # Blending mode
  min_component_voxels: 64        # Postprocessing: drop predicted CCs smaller than this
                                  #   voxel count. Size-threshold (NOT keep-largest) to
                                  #   preserve multi-blob regions (e.g. bilateral edema).
                                  #   0 disables. Applied per-channel binary mask.
  save_ensemble_masks: true               # Save meningioma-mass hard mask + multi-label NIfTI for all scans
  save_per_member_masks_all: false        # Save per-member meningioma masks for ALL scans (large!)
  save_per_member_probs_all: false        # Save per-member 3-channel soft probs (uint8) for ALL
                                          # test scans. Required for Dice(ensemble_k) curves
                                          # and threshold-sensitivity analysis. ~20 MB/member/scan
                                          # compressed => ~20-30 GB per run (150 scans × M=20).
  save_sample_predictions: true           # Save full spatial data for N sample scans
  n_sample_scans: 5                       # Number of sample scans for detailed saving
  sample_scan_strategy: "spread"          # "spread" (evenly spaced) or "first"

# =============================================================================
# Evaluation configuration
# =============================================================================
evaluation:
  compute_ece: true               # Expected Calibration Error
  ece_n_bins: 15                  # Number of bins for ECE
  compute_brier: true             # Brier score
  compute_reliability: true       # Reliability diagram data
  n_bootstrap: 10000              # Bootstrap iterations for CIs
  alpha: 0.05                     # Significance level
  subsample_voxels_step: 8        # Voxel subsampling for calibration (memory)
  # Dice(ensemble_k) and threshold-sensitivity analyses run streaming during
  # evaluate_ensemble_per_subject when per_member_probs are available (see
  # inference.save_per_member_probs_all). Threshold grid is shared between the
  # two analyses; 0.05 steps balance resolution with runtime/disk.
  compute_ensemble_k_dice: true
  compute_threshold_sensitivity: true
  threshold_grid: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50,
                   0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
