# experiments/segment_based_approach/config.yaml
# Ablation A0: Segment-Based Baseline

experiment:
  name: segment_based_baseline_a0
  seed: 42

paths:
  mengrowth_h5: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/h5_growth_datasets/MenGrowth.h5
  output_dir: /mnt/home/users/tic_163_uma/mpascual/execs/growth/segment_based_approach

segmentation:
  sw_roi_size: [128, 128, 128]
  sw_overlap: 0.5
  sw_mode: gaussian
  wt_threshold: 0.5
  use_manual_segmentation: true
  models_to_use:
    - model_name: brainsegfounder
      type: BrainSegFounder
      checkpoints: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/BrainSegFounder_finetuned_BraTS/finetuned_model_fold_0.pt
      save_to_h5: true
      enabled: true
    - model_name: bsf_adapted_decoder_men_domain
      type: BrainSegFounder
      checkpoints: /mnt/home/users/tic_163_uma/mpascual/execs/growth/lora_dual_domain_v2/conditions/baseline/best_model.pt
      save_to_h5: true
      enabled: true
    - model_name: bsf_lora_r8_adapted_men_domain
      type: BrainSegFounder
      checkpoints: /mnt/home/users/tic_163_uma/mpascual/execs/growth/lora_dual_domain_v2/conditions/men_r8/best_model.pt
      lora_alpha: 16
      lora_rank: 8
      save_to_h5: true
      enabled: true


volume:
  transform: log1p

# Prediction target: "absolute" models log(V+1), "delta_v" models Δlog(V+1)
prediction:
  target: absolute  # absolute | delta_v

# Temporal covariates for growth models (shared infrastructure with latent pipeline)
# Note: age/sex available for 5/33 patients if H5 re-converted with --metadata-csv.
covariates:
  enabled: false
  features: [centroid_x, centroid_y, centroid_z]
  missing_strategy: skip  # skip | impute_mean | drop_patient
  source: segmentation    # segmentation (from labels) | h5_metadata (from semantic/location)

# Shared GP/kernel parameters (used by ScalarGP and HGP)
gp:
  kernel: matern52
  mean_function: linear
  n_restarts: 5
  max_iter: 1000
  lengthscale_bounds: [0.1, 50.0]
  signal_var_bounds: [0.001, 10.0]
  noise_var_bounds: [0.000001, 5.0]

# LME-specific config
lme:
  method: reml

# Which GP models to evaluate (all enabled by default)
models:
  scalar_gp: true
  lme: true
  hgp: true

time:
  variable: ordinal

patients:
  exclude: [MenGrowth-0028]
  min_timepoints: 2
