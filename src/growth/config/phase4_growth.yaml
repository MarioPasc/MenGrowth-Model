# Phase 4: GP-based growth prediction configuration.
# Three-model hierarchy: LME → H-GP → MOGP on SDP latent trajectories.
#
# Methodology Revision R1: PA-MOGP → MOGP (volume-only z_vol ∈ ℝ³²).
# Location used as static GP covariate, not temporal latent.

growth:
  time_unit: months
  seed: 42

lme:
  optimizer: reml
  # No additional hyperparameters — REML estimates everything

hgp:
  kernel: matern52              # ablation A9: {matern32, matern52, se}
  mean_function: linear_from_lme  # ablation A8: {zero, linear, gompertz}
  optimizer: lbfgsb
  max_iter: 1000
  n_restarts: 5                 # random restarts for hyperparameter optimization

mogp:
  kernel: matern52              # single kernel for all 32 volume dimensions
  optimizer: lbfgsb
  max_iter: 2000
  n_restarts: 5
  static_covariates:
    location: true              # centroid coords as non-temporal covariates

evaluation:
  cv: lopo                      # leave-one-patient-out
  metrics: [vol_r2, vol_mae, latent_mse, calibration_95, per_patient_r]
  prediction_horizon: all       # predict all future timepoints from t_1
